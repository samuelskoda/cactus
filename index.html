<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Cactus Collection</title>
<style>
  :root{
    --bg:#f6f4ee; --panel:#fffdf8; --ink:#2c2a25; --muted:#7a756a;
    --line:#e4ddcf; --accent:#5a7d4f; --accent-soft:#e7efe1; --sand:#d8cbb0;
    --shadow:0 1px 2px rgba(50,45,30,.06),0 8px 24px rgba(50,45,30,.07);
    --radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#1b1a17; --panel:#252420; --ink:#ece7dc; --muted:#a49d8d;
      --line:#38352e; --accent:#8fb47f; --accent-soft:#2c3327; --sand:#4a4436;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35); }
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth;overflow-anchor:none}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  a{color:var(--accent)}
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px}

  header.hero{padding:44px 20px 16px;text-align:center;
    background:linear-gradient(180deg,var(--accent-soft),transparent);}
  .hero h1{margin:0 0 6px;font-size:2rem;letter-spacing:-.5px}
  .hero p{margin:0 auto;max-width:640px;color:var(--muted)}
  .stats{display:flex;gap:26px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .stat b{display:block;font-size:1.5rem;color:var(--accent);line-height:1}
  .stat span{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

  /* Sticky bar: a search field + a separate Filters button */
  .searchbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 88%, transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 0;margin-bottom:12px}
  .searchrow{position:relative;display:flex;gap:8px;align-items:center;justify-content:center}
  .search{position:relative;flex:0 1 260px;min-width:0}
  /* font-size:16px keeps iOS from auto-zooming when the field is tapped; explicit
     height keeps it the same size as the Filter button despite the bigger font */
  .search input{width:100%;height:38px;box-sizing:border-box;padding:0 30px 0 12px;
    border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--ink);font-size:16px}
  /* field × clears the search text (only shown when there's text) */
  .searchclose{position:absolute;right:6px;top:50%;transform:translateY(-50%);display:none;
    border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;padding:2px 6px}
  .searchclose:hover{color:var(--ink)}
  .search.hastext .searchclose{display:block}
  /* the Filters button that toggles the dropdown */
  .filterbtn{display:flex;gap:6px;align-items:center;white-space:nowrap;cursor:pointer;
    height:38px;box-sizing:border-box;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);padding:0 14px;border-radius:10px;font-size:.9rem}
  .filterbtn:hover{border-color:var(--accent)}
  .filterbtn .chev{font-size:1.5em;line-height:1;transition:transform .15s ease}
  .filterbtn[aria-expanded="true"] .chev{transform:rotate(180deg)}
  /* reserve the bold width so the button doesn't resize when a filter is active */
  .filterbtn .flabel{display:inline-flex;flex-direction:column}
  .filterbtn .flabel::after{content:"Filter";font-weight:700;height:0;overflow:hidden;visibility:hidden}
  .filterbtn.active{color:var(--accent)}
  .filterbtn.active .flabel{font-weight:700}
  /* the dropdown: floats over the content instead of pushing it down */
  .filterpanel{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
    width:min(680px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:14px 16px;z-index:30;display:none}
  .filterpanel.open{display:block}
  .facets{width:100%;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .facet{display:contents}
  .chip{border:1px solid transparent;padding:2px 7px;border-radius:999px;font-size:.66rem;
    cursor:pointer;white-space:nowrap;background:var(--panel);color:var(--ink)}
  /* colour-coded to match the detail-view tags: grey region, green genus, blue Mixed */
  .chip.c-region   {background:#e6e3dc;color:#5a564d;border-color:#d2cdc2}
  .chip.c-genus    {background:var(--accent-soft);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 32%,transparent)}
  .chip.c-mixed    {background:#dbe7f6;color:#345d92;border-color:#bcd0ea}
  .chip.c-tentative{background:#f4e7c9;color:#8a6d1f;border-color:#e6d199}
  .chip:hover{opacity:.8}
  .chip.on{color:#fff}
  .chip.c-region.on   {background:#6b665b;border-color:#6b665b;color:#fff}
  .chip.c-genus.on    {background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.c-mixed.on    {background:#3a6aa5;border-color:#3a6aa5;color:#fff}
  .chip.c-tentative.on{background:#b8901f;border-color:#b8901f;color:#fff}
  @media (prefers-color-scheme:dark){
    .chip.c-region{background:#33302a;color:#b7b0a2;border-color:#464036}
    .chip.c-mixed {background:#26313f;color:#8fb2df;border-color:#3c4c64}
    .chip.c-tentative{background:#3a3320;color:#d8b95a;border-color:#5a4e28}
  }

  .count{color:var(--muted);font-size:.85rem;margin:0 0 14px}
  /* overflow-anchor:none stops the browser from "correcting" scroll position on its
     own when we wipe and rebuild every card — that fight is what broke scrollToResults() */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px;padding-bottom:60px;overflow-anchor:none}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column}
  .thumb{aspect-ratio:3/4;background:var(--sand);overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card .body{padding:12px 13px 14px}
  .card .sci{font-style:italic;font-weight:600;font-size:.98rem;margin:0 0 3px}
  .card .sci.plain{font-style:normal}
  .card .meta{font-size:.76rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
  .badge{display:inline-block;font-size:.66rem;padding:2px 7px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent)}
  .badge.q{background:#f4e7c9;color:#8a6d1f;border-color:#e6d199}
  .badge.m{background:#dbe7f6;color:#345d92;border-color:#bcd0ea}
  .badge.r{background:#e6e3dc;color:#5a564d;border-color:#d2cdc2}
  @media (prefers-color-scheme:dark){
    .badge.q{background:#3a3320;color:#d8b95a;border-color:#5a4e28}
    .badge.m{background:#26313f;color:#8fb2df;border-color:#3c4c64}
    .badge.r{background:#33302a;color:#b7b0a2;border-color:#464036}
  }

  /* modal */
  /* the modal itself scrolls; the sheet grows with its content (one scrollbar, not two) */
  .modal{position:fixed;inset:0;z-index:60;display:none;justify-content:center;align-items:flex-start;
    padding:20px;background:rgba(20,18,12,.6);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .modal.open{display:flex}
  body.noscroll{overflow:hidden}
  .sheet{position:relative;background:var(--panel);border-radius:16px;max-width:900px;width:100%;
    margin:auto;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr 1fr}
  .sheet img{width:100%;height:100%;max-height:80vh;object-fit:cover;background:var(--sand)}
  .sheet .info{padding:26px 26px 30px;position:relative}
  .sheet h2{font-style:italic;margin:.1em 0 .1em;font-size:1.4rem}
  .sheet h2.plain{font-style:normal}
  .sheet .tagline{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}
  .sheet .tags{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
  .badge.click{cursor:pointer}
  .badge.click:hover{opacity:.78}
  .kv{margin:14px 0;border-top:1px solid var(--line);padding-top:14px}
  .kv div{display:flex;gap:10px;font-size:.9rem;margin:5px 0}
  .kv .k{color:var(--muted);min-width:74px}
  .xref{color:var(--accent);text-decoration:none;cursor:pointer;
    border-bottom:1px solid color-mix(in srgb,var(--accent) 40%,transparent)}
  .xref:hover{border-bottom-color:var(--accent)}
  /* desktop: top-right of the info panel; mobile (below) becomes a fixed floating corner button */
  .close{position:absolute;top:14px;right:16px;z-index:70;border:none;background:transparent;
    color:var(--muted);font-size:1.7rem;line-height:1;cursor:pointer;padding:0 4px}
  .close:hover{color:var(--ink)}
  .qr{margin-top:18px;font-size:.78rem;color:var(--muted);border:1px dashed var(--line);
    border-radius:10px;padding:10px 12px}
  .qr code{background:var(--accent-soft);color:var(--accent);padding:1px 6px;border-radius:5px}
  @media (max-width:640px){
    .sheet{grid-template-columns:1fr}
    .sheet img{max-height:44vh}
    .close{position:fixed;top:14px;right:14px;width:44px;height:44px;border-radius:50%;padding:0;
      background:rgba(20,18,12,.55);color:#fff;font-size:1.7rem;display:flex;align-items:center;justify-content:center}
  }
  footer{color:var(--muted);font-size:.8rem;text-align:center;padding:30px 20px 50px;border-top:1px solid var(--line)}
  /* touch devices: neutralise hover styles so they don't "stick" after a tap */
  @media (hover: none){
    .searchclose:hover{color:var(--muted)}
    .filterbtn:hover{border-color:var(--line)}
    .chip:hover{opacity:1}
    .badge.click:hover{opacity:1}
    .xref:hover{border-bottom-color:color-mix(in srgb,var(--accent) 40%,transparent)}
  }
</style>
</head>
<body>
<header class="hero">
  <div class="wrap">
    <h1>🌵 My Cactus Collection</h1>
    <p>A photo catalogue of the potted cacti. Browse by genus or by region of origin, or search by name. Tap any plant for details.</p>
    <div class="stats">
      <div class="stat"><b id="s-total">–</b><span>Plants</span></div>
      <div class="stat"><b id="s-species">–</b><span>Species</span></div>
      <div class="stat"><b id="s-genera">–</b><span>Genera</span></div>
      <div class="stat"><b id="s-regions">–</b><span>Regions</span></div>
    </div>
  </div>
</header>

<div id="scrollAnchor" style="height:0"></div>
<div class="searchbar">
  <div class="wrap">
    <div class="searchrow" id="searchRow">
      <div class="search" id="searchBox">
        <input id="q" type="text" placeholder="Search…" aria-label="Search">
        <button class="searchclose" id="searchClose" type="button" aria-label="Clear search">×</button>
      </div>
      <button class="filterbtn" id="filterToggle" type="button" aria-expanded="false" aria-controls="filterPanel"><span class="flabel">Filter</span><span class="chev">▾</span></button>
      <div class="filterpanel" id="filterPanel">
        <div class="facets">
          <div class="facet" id="regionFacet"></div>
          <div class="facet" id="genusFacet"></div>
          <div class="facet" id="otherFacet"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<main class="wrap">
  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
</main>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="sheet" id="sheet"></div>
</div>

<footer class="wrap">
  Identifications are best-effort and not authoritative — some are uncertain and may be wrong.
</footer>
<div id="scrollPad" style="height:0"></div>

<script src="data.js"></script>
<script>
  const data = window.CACTI;
  const wiki = window.GENUS_WIKI || {};
  const grid = document.getElementById('grid');
  const state = { q:"", region:null, genus:null, tentative:false };

  const uniq = (arr)=>[...new Set(arr)];
  const asArr = (v)=>Array.isArray(v)?v:[v];      // tolerate old string-valued entries

  // ---- stats
  document.getElementById('s-total').textContent = data.length;
  document.getElementById('s-species').textContent =
    uniq(data.map(d=>d.name.replace(/\s*\(.*\)/,'')).filter(n=>!/^Mixed|sp\.$|offshoots/i.test(n))).length;
  const SPECIAL = "Mixed & offshoots";              // grouping tag, not a real genus
  const isMixed = d => asArr(d.genus).includes(SPECIAL);
  const allGenera  = uniq(data.flatMap(d=>asArr(d.genus)));
  const allRegions = uniq(data.flatMap(d=>asArr(d.region)));
  document.getElementById('s-genera').textContent  = allGenera.filter(g=>g!==SPECIAL).length;
  document.getElementById('s-regions').textContent = allRegions.length;

  // ---- facets
  function buildFacet(el, values, key){
    values.forEach(v=>{
      const b=document.createElement('button');
      const color = key==='region' ? 'c-region' : (v===SPECIAL ? 'c-mixed' : 'c-genus');
      b.className='chip '+color; b.textContent=v; b.dataset.val=v;
      b.onclick=()=>selectFilter(key, v);
      el.appendChild(b);
    });
  }
  const genera = allGenera.filter(g=>g!==SPECIAL).sort();
  buildFacet(document.getElementById('regionFacet'), allRegions, 'region');
  buildFacet(document.getElementById('genusFacet'), genera, 'genus');
  buildOther(document.getElementById('otherFacet'));

  // the "Other" group: the Mixed grouping (blue) + a Tentative filter (yellow)
  function buildOther(el){
    if(allGenera.includes(SPECIAL)){
      const b=document.createElement('button');
      b.className='chip c-mixed'; b.textContent=SPECIAL; b.dataset.other='mixed';
      b.onclick=()=>selectFilter('genus', SPECIAL);
      el.appendChild(b);
    }
    const t=document.createElement('button');
    t.className='chip c-tentative'; t.textContent='Tentative'; t.dataset.other='tentative';
    t.onclick=()=>selectFilter('tentative');
    el.appendChild(t);
  }

  function syncChips(){
    document.querySelectorAll('#regionFacet .chip').forEach(c=>c.classList.toggle('on',c.dataset.val===state.region));
    document.querySelectorAll('#genusFacet .chip').forEach(c=>c.classList.toggle('on',c.dataset.val===state.genus));
    const mix=document.querySelector('#otherFacet .chip[data-other="mixed"]'); if(mix) mix.classList.toggle('on', state.genus===SPECIAL);
    const ten=document.querySelector('#otherFacet .chip[data-other="tentative"]'); if(ten) ten.classList.toggle('on', !!state.tentative);
  }

  document.getElementById('q').addEventListener('input', e=>{
    const hadText = state.q.length>0;
    state.q=e.target.value.toLowerCase().trim();
    document.getElementById('searchBox').classList.toggle('hastext', e.target.value.length>0);
    render();
    if(!hadText && state.q.length>0) scrollToResults();   // first keystroke: bring results into view
  });

  // ---- render grid
  function match(d){
    if(state.region && !asArr(d.region).includes(state.region)) return false;
    if(state.genus  && !asArr(d.genus).includes(state.genus))   return false;
    if(state.tentative && !d.uncertain) return false;
    if(state.q){
      const hay=(d.name+' '+d.tag+' '+asArr(d.genus).join(' ')+' '+asArr(d.region).join(' ')+' '+d.origin+' '+d.blurb).toLowerCase();
      if(!hay.includes(state.q)) return false;
    }
    return true;
  }
  function card(d){
    return `<article class="card" onclick="openModal('${d.id}')">
      <div class="thumb"><img loading="lazy" src="${d.file}" alt="${d.name}"></div>
      <div class="body">
        <p class="sci${isMixed(d)?' plain':''}">${d.name} ${d.uncertain?'<span class="badge q">?</span>':''}</p>
        <div class="meta"><span>${d.origin}</span></div>
      </div>
    </article>`;
  }
  function render(){
    // Pre-grow the spacer BEFORE the grid changes, using only measurements of
    // the OLD (still on-screen) grid. If we waited to measure until after a
    // big shrink (e.g. down to one card), the read alone can force the browser
    // to clamp the scroll position — a jump right before our smooth scroll
    // animates. Growing first, conservatively, makes that shrink impossible.
    growPadForWorstCase();

    const list=data.filter(match).sort((a,b)=>{
      const am=isMixed(a), bm=isMixed(b);
      if(am!==bm) return am?1:-1;               // Mixed & offshoots always last
      return a.name.localeCompare(b.name);      // otherwise alphabetical by name
    });
    grid.innerHTML=list.map(card).join('') || '<p class="count">No plants match those filters.</p>';
    document.getElementById('count').textContent =
      `${list.length} of ${data.length} plants` +
      (state.region?` · ${state.region}`:'') + (state.genus?` · ${state.genus}`:'') + (state.tentative?' · Tentative':'');
    document.getElementById('filterToggle').classList.toggle('active', !!(state.region||state.genus||state.tentative));

    // Only grow further here (rare — the worst-case estimate above already
    // covers a normal shrink); never shrink immediately. Shrinking back down
    // to the exact minimal size is deferred until scrolling has settled.
    growPadForWorstCase();
    clearTimeout(trimPadTimer);
    trimPadTimer = setTimeout(trimPadToMinimal, 500);
  }
  // grow the bottom spacer so there's always enough page to scroll the search
  // bar to the top, even when a filter leaves just one row of results
  function growPadForWorstCase(){
    const pad=document.getElementById('scrollPad');
    if(!pad) return;
    const currentPad = pad.offsetHeight;
    const gridHeight = grid.offsetHeight;
    const otherHeight = (document.documentElement.scrollHeight - currentPad) - gridHeight;
    // assume the grid could shrink all the way to nothing — a safe upper bound
    const worstCaseNeeded = window.scrollY + window.innerHeight - otherHeight;
    if(worstCaseNeeded > currentPad) pad.style.height = worstCaseNeeded + 'px';
  }
  let trimPadTimer=null;
  function trimPadToMinimal(){
    const pad=document.getElementById('scrollPad'), anchor=document.getElementById('scrollAnchor');
    if(!pad || !anchor) return;
    const currentPad = pad.offsetHeight;
    const contentHeight = document.documentElement.scrollHeight - currentPad;
    const minimal = Math.max(0, anchor.offsetTop + window.innerHeight - contentHeight);
    if(minimal !== currentPad) pad.style.height = minimal + 'px';
  }

  // ---- modal
  const modal=document.getElementById('modal'), sheet=document.getElementById('sheet');
  const cleanName = n => n.replace(/\s*\(.*\)/,'').trim();
  function genusLinks(d){
    return asArr(d.genus).filter(g=>g!==SPECIAL).map(g=>
      wiki[g] ? `<a href="${wiki[g]}" target="_blank" rel="noopener">${g}</a>` : g
    ).join(' · ');
  }
  // Wikipedia article for the species itself (null for "sp."/mixed/non-binomials)
  const noWiki = window.NO_WIKI || [];
  function speciesWiki(d){
    const c = cleanName(d.name);
    if(/\bsp\.|Mixed|dish|×|offshoots/i.test(c)) return null;   // no article for genus-only / mixed / hybrids / grouping names
    if(noWiki.includes(c)) return null;                          // known non-existent articles
    const parts = c.split(/\s+/);
    if(parts.length < 2) return null;
    return "https://en.wikipedia.org/wiki/" + parts.slice(0,2).join("_");
  }
  function speciesCell(d){
    const list = (d.species && d.species.length) ? d.species : [d.name];
    return list.map(s=>{
      const url = speciesWiki({name:s});
      return url ? `<a href="${url}" target="_blank" rel="noopener"><em>${s}</em></a>` : s;
    }).join(' · ');
  }
  const escAttr = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  // all filter tags on one line, ordered: blue Mixed, grey Region, green Genus, yellow tentative
  function allTags(d){
    const genera = asArr(d.genus);
    const blue   = genera.filter(g=>g===SPECIAL).map(g=>`<span class="badge m click" data-genus="${escAttr(g)}">${g}</span>`);
    const grey   = asArr(d.region).map(r=>`<span class="badge r click" data-region="${escAttr(r)}">${r}</span>`);
    const green  = genera.filter(g=>g!==SPECIAL).map(g=>`<span class="badge click" data-genus="${escAttr(g)}">${g}</span>`);
    const yellow = d.uncertain ? ['<span class="badge q click" data-tentative="1">Tentative</span>'] : [];
    return [...blue, ...grey, ...green, ...yellow].join(' ');
  }
  // only one filter may be active at a time
  function clearFilters(){ state.region=null; state.genus=null; state.tentative=false; }
  // scroll so the sticky search bar sits at the top with the first result just below it
  function scrollToResults(){
    const anchor=document.getElementById('scrollAnchor');
    if(!anchor) return;
    // offsetTop on the sticky search bar itself is unreliable once it's "stuck"
    // in some browsers, so target a plain (non-sticky) marker just above it and
    // compute its position fresh each time via getBoundingClientRect + scrollY.
    const doScroll=()=>{
      const target = window.scrollY + anchor.getBoundingClientRect().top;
      window.scrollTo({top: Math.max(0, target), behavior:'smooth'});
    };
    doScroll();
    requestAnimationFrame(doScroll);
    setTimeout(doScroll, 120);
  }
  // menu chips: toggle this filter (clearing the others), then close the dropdown
  function selectFilter(key, value){
    const target = key==='tentative' ? true : value;
    const wasActive = state[key] === target;
    clearFilters();
    if(!wasActive) state[key] = target;
    syncChips(); render();
    closePanel();
    scrollToResults();
  }
  // modal tags: make this the only active filter, then close
  function applyFilter(key, value){
    clearFilters();
    state[key] = key==='tentative' ? true : value;
    syncChips(); render(); closeModal();
    scrollToResults();
  }
  // turn "#plant-id" cross-references in a blurb into links that open that plant
  function linkifyBlurb(text){
    return text.replace(/#([a-z0-9-]+)/gi, (m, id)=>
      data.some(x=>x.id===id) ? `<a href="#${id}" class="xref" data-goto="${escAttr(id)}">#${id}</a>` : m);
  }
  function openModal(id){
    const d=data.find(x=>x.id===id); if(!d) return;
    location.hash=id;
    sheet.innerHTML=`
      <img src="${d.file}" alt="${d.name}">
      <div class="info">
        <button class="close" onclick="closeModal()" aria-label="Close">×</button>
        <h2${isMixed(d)?' class="plain"':''}>${d.name}</h2>
        <div class="tags">${allTags(d)}</div>
        <p>${linkifyBlurb(d.blurb)}</p>
        <div class="kv">
          <div><span class="k">Species</span><span>${speciesCell(d)}</span></div>
          <div><span class="k">Genus</span><span>${genusLinks(d)}</span></div>
          <div><span class="k">Origin</span><span>${d.origin}</span></div>
          <div><span class="k">Tag</span><span>#${d.id}</span></div>
        </div>
      </div>`;
    sheet.querySelectorAll('[data-genus]').forEach(el=>{ el.onclick=()=>applyFilter('genus', el.dataset.genus); });
    sheet.querySelectorAll('[data-region]').forEach(el=>{ el.onclick=()=>applyFilter('region', el.dataset.region); });
    sheet.querySelectorAll('[data-tentative]').forEach(el=>{ el.onclick=()=>applyFilter('tentative'); });
    sheet.querySelectorAll('[data-goto]').forEach(el=>{ el.onclick=e=>{ e.preventDefault(); openModal(el.dataset.goto); }; });
    modal.classList.add('open'); document.body.classList.add('noscroll'); modal.scrollTop=0;
  }
  function closeModal(){ modal.classList.remove('open'); document.body.classList.remove('noscroll'); if(location.hash) history.replaceState(null,'',location.pathname); }
  modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
  window.openModal=openModal; window.closeModal=closeModal;

  // the Filters button toggles the dropdown (search field is independent)
  const searchRow=document.getElementById('searchRow');
  const searchBox=document.getElementById('searchBox');
  const searchInput=document.getElementById('q');
  const filterPanel=document.getElementById('filterPanel');
  const filterToggle=document.getElementById('filterToggle');
  function openPanel(){ filterPanel.classList.add('open'); filterToggle.setAttribute('aria-expanded','true'); }
  function closePanel(){ filterPanel.classList.remove('open'); filterToggle.setAttribute('aria-expanded','false'); }
  filterToggle.addEventListener('click', ()=>{ filterPanel.classList.contains('open') ? closePanel() : openPanel(); });
  document.addEventListener('click', e=>{ if(!searchRow.contains(e.target)) closePanel(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePanel(); });
  // field × just clears the search text
  document.getElementById('searchClose').addEventListener('click', ()=>{
    searchInput.value=''; state.q=''; searchBox.classList.remove('hastext');
    render(); searchInput.blur();
  });

  window.addEventListener('resize', trimPadToMinimal);
  render();
  // deep-link support (QR / shared link)
  if(location.hash){ const id=location.hash.slice(1); if(data.some(d=>d.id===id)) openModal(id); }
</script>
</body>
</html>
