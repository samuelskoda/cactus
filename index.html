<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- interactive-widget=resizes-content: when the on-screen keyboard opens, shrink
     the layout viewport instead of just panning the visual one. position:sticky
     then keeps working natively — no JS repositioning (and none of its lag/stutter,
     since iOS pans the viewport on the compositor thread, ahead of JS events).
     Browsers without support ignore it and use the JS fallback pinning. -->
<meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
<title>My Cactus Collection</title>
<style>
  :root{
    --bg:#f6f4ee; --panel:#fffdf8; --ink:#2c2a25; --muted:#7a756a;
    --line:#e4ddcf; --accent:#5a7d4f; --accent-soft:#e7efe1; --sand:#d8cbb0;
    --shadow:0 1px 2px rgba(50,45,30,.06),0 8px 24px rgba(50,45,30,.07);
    --radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#1b1a17; --panel:#252420; --ink:#ece7dc; --muted:#a49d8d;
      --line:#38352e; --accent:#8fb47f; --accent-soft:#2c3327; --sand:#4a4436;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35); }
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth;overflow-anchor:none}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  a{color:var(--accent)}
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px}

  header.hero{position:relative;padding:44px 20px 16px;text-align:center;
    background:linear-gradient(180deg,var(--accent-soft),transparent);}
  /* Language switch. Lives in the hero's corner rather than fixed to the window: fixed would
     collide with the modal's close button, which is itself a fixed top-right circle on mobile. */
  .langswitch{position:absolute;top:14px;right:16px;z-index:5;font-family:inherit;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:5px 11px;border-radius:999px;font-size:.78rem;cursor:pointer;line-height:1.3}
  .langswitch:hover{border-color:var(--accent);color:var(--accent)}
  .hero h1{margin:0 0 6px;font-size:2rem;letter-spacing:-.5px}
  .hero p{margin:0 auto;max-width:640px;color:var(--muted)}
  .stats{display:flex;gap:26px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .stat b{display:block;font-size:1.5rem;color:var(--accent);line-height:1}
  .stat span{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

  /* Sticky bar: a search field + a separate Filters button */
  .searchbar{position:sticky;top:0;z-index:20;
    border-bottom:1px solid var(--line);padding:12px 0;margin-bottom:12px}
  /* While the keyboard is open, iOS Safari breaks position:sticky — the bar stops sticking
     and scrolls off with the page (measured: barTop -1322 at scrollY 1622, offsetTop 0,
     visualViewport height 362 vs layout 739). position:fixed does NOT have this bug, and
     because the viewport isn't panned (offsetTop 0) fixed;top:0 lands exactly at the screen
     top. We only pin while the keyboard is engaged — by then focus has already scrolled the
     bar to the top and the header is off-screen, so fixed;top:0 doesn't cover anything. The
     #scrollAnchor above reserves the bar's flow height meanwhile so nothing jumps. */
  .searchbar.pinned{position:fixed;top:0;left:0;right:0;margin-bottom:0}
  /* Frosted glass on a dedicated child layer rather than on the bar itself: a blur on the
     sticky bar went stale after the keyboard resized the visual viewport and flickered on
     every later scroll; this div isn't sticky, which is what fixed that.
     The layers are ordered explicitly — glass at 0, content above at 1 — and NOT with a
     negative z-index on the glass. Under z-index:-1 iOS intermittently painted the glass
     over the bar's content instead of behind it during keyboard/toolbar re-composites:
     its near-opaque tint flattened the bar into a dark rectangle (looked like the bar
     vanishing) and visibly darkened the opaque input and Filter button, clearing once the
     compositor settled. The bar must stay background-less either way, so the blur samples
     the page rather than the bar. -webkit- prefix required below Safari 18. */
  /* The glass reaches ABOVE the bar, and that overhang is load-bearing. iOS composites a
     sticky element with about a frame of lag during a flick, so content briefly shows through
     as a thin bright sliver along the top edge. It is invisible to JS — measured barTop is
     exactly 0 on all 1200 frames of a recording where the video clearly shows the leak — so no
     amount of repositioning can fix it. Painting past the edge covers the seam instead. The
     overhang lands on the hero's faded-out bottom, which is already --bg, so it does not show. */
  .searchbar .glass{position:absolute;inset:-10px 0 0 0;z-index:0;
    background:color-mix(in srgb,var(--bg) 88%, transparent);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .searchbar > .wrap{position:relative;z-index:1}
  /* No blur support -> opaque bar, so content can't show through while it's stuck. */
  @supports not ((-webkit-backdrop-filter:blur(1px)) or (backdrop-filter:blur(1px))){
    .searchbar{background:var(--bg);box-shadow:0 -10px 0 var(--bg)}   /* same overhang, no blur */
    .searchbar .glass{display:none}
  }
  .searchrow{position:relative;display:flex;gap:8px;align-items:center;justify-content:center}
  .search{position:relative;flex:0 1 260px;min-width:0}
  /* font-size:16px keeps iOS from auto-zooming when the field is tapped; explicit
     height keeps it the same size as the Filter button despite the bigger font */
  .search input{width:100%;height:38px;box-sizing:border-box;padding:0 30px 0 12px;
    border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--ink);font-size:16px}
  /* type="search" keeps the iOS keyboard's "Search" action button; hide only
     its native round clear-× so our own custom one (searchclose) is the only one */
  .search input::-webkit-search-cancel-button,
  .search input::-webkit-search-decoration{-webkit-appearance:none;appearance:none}
  /* field × clears the search text (only shown when there's text) */
  .searchclose{position:absolute;right:4px;top:50%;transform:translateY(-50%);display:none;
    border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:1.6rem;line-height:1;padding:2px 6px}
  .searchclose:hover{color:var(--ink)}
  .search.hastext .searchclose{display:block}
  /* the Filters button that toggles the dropdown */
  .filterbtn{display:flex;gap:6px;align-items:center;white-space:nowrap;cursor:pointer;
    height:38px;box-sizing:border-box;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);padding:0 14px;border-radius:10px;font-size:.9rem}
  .filterbtn:hover{border-color:var(--accent)}
  .filterbtn .chev{font-size:1.5em;line-height:1;transition:transform .15s ease}
  .filterbtn[aria-expanded="true"] .chev{transform:rotate(180deg)}
  /* reserve the bold width so the button doesn't resize when a filter is active */
  .filterbtn .flabel{display:inline-flex;flex-direction:column}
  .filterbtn .flabel::after{content:"Filter";font-weight:700;height:0;overflow:hidden;visibility:hidden}
  .filterbtn.active{color:var(--accent)}
  .filterbtn.active .flabel{font-weight:700}
  /* the dropdown: floats over the content instead of pushing it down */
  .filterpanel{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
    width:min(680px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:14px 16px;z-index:30;display:none}
  .filterpanel.open{display:block}
  .facets{width:100%;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .facet{display:contents}
  .chip{border:1px solid transparent;padding:2px 7px;border-radius:999px;font-size:.66rem;
    cursor:pointer;white-space:nowrap;background:var(--panel);color:var(--ink)}
  /* colour-coded to match the detail-view tags: grey region, green genus, blue Mixed */
  .chip.c-region   {background:#e6e3dc;color:#5a564d;border-color:#d2cdc2}
  .chip.c-genus    {background:var(--accent-soft);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 32%,transparent)}
  .chip.c-mixed    {background:#dbe7f6;color:#345d92;border-color:#bcd0ea}
  .chip.c-tentative{background:#f4e7c9;color:#8a6d1f;border-color:#e6d199}
  .chip.c-flower   {background:#f7e0ec;color:#a33a6e;border-color:#eec4d9}
  .chip:hover{opacity:.8}
  .chip.on{color:#fff}
  .chip.c-region.on   {background:#6b665b;border-color:#6b665b;color:#fff}
  .chip.c-genus.on    {background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.c-mixed.on    {background:#3a6aa5;border-color:#3a6aa5;color:#fff}
  .chip.c-tentative.on{background:#b8901f;border-color:#b8901f;color:#fff}
  .chip.c-flower.on   {background:#b8437e;border-color:#b8437e;color:#fff}
  @media (prefers-color-scheme:dark){
    .chip.c-region{background:#33302a;color:#b7b0a2;border-color:#464036}
    .chip.c-mixed {background:#26313f;color:#8fb2df;border-color:#3c4c64}
    .chip.c-tentative{background:#3a3320;color:#d8b95a;border-color:#5a4e28}
    .chip.c-flower   {background:#3a2430;color:#e59bc0;border-color:#5c3549}
  }

  .count{color:var(--muted);font-size:.85rem;margin:0 0 14px}
  /* overflow-anchor:none stops the browser from "correcting" scroll position on its
     own when we wipe and rebuild every card — that fight is what broke scrollToResults() */
  /* auto-fill would pack 4+ narrow columns on a wide screen, and a long binomial like
     "Coryphantha elephantidens" then wrapped its flower marker onto a line of its own.
     Capping at 3 keeps every card wide enough for the longest name in the collection. */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px;padding-bottom:60px;overflow-anchor:none}
  @media (min-width:760px){ .grid{grid-template-columns:repeat(3,1fr)} }
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column}
  /* display:flex above would otherwise beat the hidden attribute */
  .card[hidden]{display:none}
  /* Square on the card, while the photos themselves are 3:4. The crop is the point: the card
     shows the plant, and opening it reveals the rest of the frame. Matching the photo's own
     ratio here made the detail view an exact repeat of the preview. */
  .thumb{aspect-ratio:1/1;background:var(--sand);overflow:hidden}
  /* Long-pressing an image on iOS zooms it and throws up the save/share sheet, which gets in
     the way of tapping a card and of dragging the photo carousel. -webkit-touch-callout kills
     the sheet, user-select the text-selection that comes with it. The cost is that long-press
     to Save Image goes too, which is fine here — these came from Photos in the first place. */
  .thumb img,
  .sheet .photo img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card .body{padding:12px 13px 14px}
  .card .sci{font-style:italic;font-weight:600;font-size:.98rem;margin:0 0 3px}
  .card .sci.plain{font-style:normal}
  .card .meta{font-size:.76rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
  .badge{display:inline-block;font-size:.66rem;padding:2px 7px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent)}
  .badge.q{background:#f4e7c9;color:#8a6d1f;border-color:#e6d199}
  .badge.m{background:#dbe7f6;color:#345d92;border-color:#bcd0ea}
  .badge.r{background:#e6e3dc;color:#5a564d;border-color:#d2cdc2}
  .badge.f{background:#f7e0ec;color:#a33a6e;border-color:#eec4d9}
  @media (prefers-color-scheme:dark){
    .badge.q{background:#3a3320;color:#d8b95a;border-color:#5a4e28}
    .badge.m{background:#26313f;color:#8fb2df;border-color:#3c4c64}
    .badge.r{background:#33302a;color:#b7b0a2;border-color:#464036}
    .badge.f{background:#3a2430;color:#e59bc0;border-color:#5c3549}
  }

  /* modal */
  /* the modal itself scrolls; the sheet grows with its content (one scrollbar, not two) */
  .modal{position:fixed;inset:0;z-index:60;display:none;justify-content:center;align-items:flex-start;
    padding:20px;background:rgba(20,18,12,.6);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .modal.open{display:flex}
  body.noscroll{overflow:hidden}
  .sheet{position:relative;background:var(--panel);border-radius:16px;max-width:900px;width:100%;
    margin:auto;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr 1fr}
  .sheet .info{padding:26px 26px 30px;position:relative}
  /* ONE box for the whole photo set. Its height comes from a spacer sized by the FIRST photo's
     aspect ratio (--ar, set in JS), and every photo is absolutely positioned to fill it. The
     box used to be sized by the current <img> itself, so stepping to a photo with different
     dimensions resized the whole sheet. --ar is a fallback until the first photo reports its
     size; overflow:hidden keeps the spacer from pushing past the max-height cap. */
  .sheet .photo{position:relative;height:100%;max-height:80vh;overflow:hidden;--ar:.75;
    touch-action:pan-y}
  .sheet .photo::before{content:'';display:block;padding-top:calc(var(--ar) * 100%)}
  /* The photos lie side by side in one row and the row slides, so a drag moves between
     neighbours exactly as far as the finger does. Rendering them all also avoids swapping a
     single <img>'s src, which blanks the element while the new file decodes.
     touch-action:pan-y lets the browser keep vertical scrolling while handing horizontal
     gestures to us, so the listeners can stay passive and never fight the sheet's scroll. */
  .sheet .photo .track{position:absolute;inset:0;display:flex;
    transition:transform .32s cubic-bezier(.22,.61,.36,1);will-change:transform}
  .sheet .photo .track img{flex:0 0 100%;width:100%;height:100%;
    object-fit:cover;background:var(--sand)}
  /* Above the sliding row. Without this the photos paint over the controls and the arrows and
     counter vanish — the track is a positioned element, so the controls need to out-rank it. */
  .photo .nav, .photo .pcount{z-index:2}
  @media (prefers-reduced-motion:reduce){
    .sheet .photo .track{transition:none}
  }
  .photo .nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;
    border:none;border-radius:50%;background:rgba(20,18,12,.5);color:#fff;
    font-size:1.5rem;line-height:1;cursor:pointer;padding:0}
  /* Hover affordance on the arrows — pointer devices only, so it can't stick after a tap. */
  @media (hover:hover){
    .photo .nav{opacity:.6;transition:opacity .15s ease, background-color .15s ease}
    .photo:hover .nav{opacity:.9}
    .photo .nav:hover{opacity:1;background:rgba(20,18,12,.82)}
  }
  .photo .nav.prev{left:10px}
  .photo .nav.next{right:10px}
  .photo .pcount{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
    background:rgba(20,18,12,.5);color:#fff;font-size:.8rem;padding:2px 10px;border-radius:999px}
  .sheet h2{font-style:italic;margin:.1em 0 .1em;font-size:1.4rem}
  .sheet h2.plain{font-style:normal}
  .sheet .tagline{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}
  .sheet .tags{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
  /* card marker: the plant has a photo of it in flower. Sits with the name, not as a badge,
     so it reads as part of the title rather than as another filter chip. */
  /* Card markers (in flower, mixed planting). Glued to the preceding word: on their own they
     could wrap to a line by themselves, which read as a stray icon under the name. The name may
     still wrap; the markers ride the last word. */
  .mark{font-size:.85em;vertical-align:baseline;line-height:1;white-space:nowrap}
  .badge.click{cursor:pointer}
  .badge.click:hover{opacity:.78}
  .kv{margin:14px 0;border-top:1px solid var(--line);padding-top:14px}
  .kv div{display:flex;gap:10px;font-size:.9rem;margin:5px 0}
  .kv .k{color:var(--muted);min-width:74px}
  .xref{color:var(--accent);text-decoration:none;cursor:pointer;
    border-bottom:1px solid color-mix(in srgb,var(--accent) 40%,transparent)}
  .xref:hover{border-bottom-color:var(--accent)}
  /* desktop: top-right of the info panel; mobile (below) becomes a fixed floating corner button */
  .close{position:absolute;top:14px;right:16px;z-index:70;border:none;background:transparent;
    color:var(--muted);font-size:1.7rem;line-height:1;cursor:pointer;padding:0 4px}
  .close:hover{color:var(--ink)}
  .qr{margin-top:18px;font-size:.78rem;color:var(--muted);border:1px dashed var(--line);
    border-radius:10px;padding:10px 12px}
  .qr code{background:var(--accent-soft);color:var(--accent);padding:1px 6px;border-radius:5px}
  @media (max-width:640px){
    .sheet{grid-template-columns:1fr}
    /* Tall enough for a whole 3:4 photo, which needs ~56vh across phone sizes. At 44vh the
       detail view cropped 89px off it and came out nearly square — the same framing as the
       card, so opening a plant revealed nothing. The sheet scrolls, so the extra height
       costs only that the text starts lower. */
    .sheet .photo{max-height:60vh}
    .close{position:fixed;top:6px;right:14px;width:44px;height:44px;border-radius:50%;padding:0;
      background:rgba(20,18,12,.55);color:#fff;font-size:1.7rem;display:flex;align-items:center;justify-content:center}
  }
  footer{color:var(--muted);font-size:.8rem;text-align:center;padding:30px 20px 50px;border-top:1px solid var(--line)}
  /* touch devices: neutralise hover styles so they don't "stick" after a tap */
  @media (hover: none){
    .langswitch:hover{border-color:var(--line);color:var(--ink)}
    .searchclose:hover{color:var(--muted)}
    .filterbtn:hover{border-color:var(--line)}
    .chip:hover{opacity:1}
    .badge.click:hover{opacity:1}
    .xref:hover{border-bottom-color:color-mix(in srgb,var(--accent) 40%,transparent)}
  }
</style>
</head>
<body>
<header class="hero">
  <button class="langswitch" id="langSwitch" type="button"></button>
  <div class="wrap">
    <h1 data-i18n="h1">🌵 My Cactus Collection</h1>
    <p data-i18n="intro">A photo catalogue of the potted cacti. Browse by genus or by region of origin, or search by name. Tap any plant for details.</p>
    <div class="stats">
      <div class="stat"><b id="s-total">–</b><span data-i18n="plants">Plants</span></div>
      <div class="stat"><b id="s-species">–</b><span data-i18n="species">Species</span></div>
      <div class="stat"><b id="s-genera">–</b><span data-i18n="genera">Genera</span></div>
      <div class="stat"><b id="s-regions">–</b><span data-i18n="regions">Regions</span></div>
    </div>
  </div>
</header>

<div id="scrollAnchor" style="height:0"></div>
<div class="searchbar">
  <div class="glass" aria-hidden="true"></div>
  <div class="wrap">
    <div class="searchrow" id="searchRow">
      <div class="search" id="searchBox">
        <!-- enterkeyhint gives iOS a real "Search" action key instead of a plain
             return; pressing it blurs the field (see JS) to dismiss the keyboard -->
        <input id="q" type="search" enterkeyhint="search" placeholder="Search…" aria-label="Search">
        <button class="searchclose" id="searchClose" type="button" aria-label="Clear search">×</button>
      </div>
      <button class="filterbtn" id="filterToggle" type="button" aria-expanded="false" aria-controls="filterPanel"><span class="flabel">Filter</span><span class="chev">▾</span></button>
      <div class="filterpanel" id="filterPanel">
        <div class="facets">
          <div class="facet" id="regionFacet"></div>
          <div class="facet" id="genusFacet"></div>
          <div class="facet" id="otherFacet"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<main class="wrap">
  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
</main>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="sheet" id="sheet"></div>
</div>

<footer class="wrap" data-i18n="footer">
  Identifications are best-effort and not authoritative — some are uncertain and may be wrong.
</footer>
<div id="scrollPad" style="height:0"></div>

<!-- cache-bust: bump this ?v= on every deploy that touches data.js, so browsers
     (Safari in particular caches aggressively) never run it against a mismatched
     index.html — a stale data.js here previously broke photo paths and clicks -->
<script src="data.js?v=13"></script>
<script>
  // Safari restores the pre-reload scroll position ASYNCHRONOUSLY after a reload
  // (pull-to-refresh being the main reload path here). If a search tap lands before that
  // restoration does, the restore arrives mid-keyboard-cycle — recreating the stale-scroll
  // dance whose pan makes dismissals flicker, intermittently by timing ("depends how long
  // the refresh sits"). Manual restoration means a reload never moves the page on its own.
  if('scrollRestoration' in history) history.scrollRestoration = 'manual';
  const data = window.CACTI;
  const wiki = window.GENUS_WIKI || {};
  const grid = document.getElementById('grid');
  const state = { q:"", region:null, genus:null, tentative:false, flower:false };

  const uniq = (arr)=>[...new Set(arr)];
  const asArr = (v)=>Array.isArray(v)?v:[v];      // tolerate old string-valued entries

  // ---- language
  // Region names and the "Mixed & offshoots" grouping are DATA VALUES: they key the filters and
  // live in data.js. Only their labels are translated here, never the values themselves, so a
  // filter keeps working when the language changes mid-browse. Genus and species stay Latin.
  const I18N = {
    en: {
      lang:'en', htmlLang:'en', other:'Slovensky',
      title:'My Cactus Collection',
      h1:'🌵 My Cactus Collection',
      intro:'A photo catalogue of the potted cacti. Browse by genus or by region of origin, or search by name. Tap any plant for details.',
      plants:'Plants', species:'Species', genera:'Genera', regions:'Regions',
      searchPlaceholder:'Search…', searchAria:'Search', clearSearch:'Clear search', filter:'Filter',
      tentative:'Tentative', inFlower:'In flower', inFlowerCard:'Photographed in flower',
      mixedCard:'Mixed planting',
      mixed:'Mixed & offshoots',
      noMatch:'No plants match those filters.',
      count:(shown,total)=>`${shown} of ${total} plants`,
      kSpecies:'Species', kGenus:'Genus', kOrigin:'Origin', kCatalog:'Catalog #',
      prevPhoto:'Previous photo', nextPhoto:'Next photo', close:'Close',
      footer:'Identifications are best-effort and not authoritative — some are uncertain and may be wrong.',
      region:{}, origin:{}
    },
    sk: {
      lang:'sk', htmlLang:'sk', other:'English',
      title:'Moja zbierka kaktusov',
      h1:'🌵 Moja zbierka kaktusov',
      intro:'Fotografický katalóg kaktusov v kvetináčoch. Prezerajte podľa rodu alebo oblasti pôvodu, prípadne hľadajte podľa názvu. Ťuknutím na rastlinu zobrazíte podrobnosti.',
      // These read as the count above them. Slovak takes the genitive from five up —
      // "37 rastlín", "28 druhov", "13 rodov" — but the nominative for two to four,
      // and there are only three regions, so "3 oblasti".
      plants:'Rastlín', species:'Druhov', genera:'Rodov', regions:'Oblasti',

  // grow the bottom spacer so there's always enough page to scroll the search

  function genusLinks(d){
    return asArr(d.genus).filter(g=>g!==SPECIAL).map(g=>

    if(noWiki.includes(c)) return null;                          // known non-existent articles

    const grey   = asArr(d.region).map(r=>`<span class="badge r click" data-region="${escAttr(r)}">${regionLabel(r)}</span>`);
    const green  = genera.filter(g=>g!==SPECIAL).map(g=>`<span class="badge click" data-genus="${escAttr(g)}">${g}</span>`);
    const yellow = d.uncertain ? [`<span class="badge q click" data-tentative="1">? ${t('tentative')}</span>`] : [];

  // decision in onSettled() reads the flow slot live, and it is armed by scroll AND resize
  // events - which the keyboard's own arrival generates. So the decision races the focus
  // scroll, and whichever arrives first picks the answer. Win the race (measured: the scroll
  // lands ~390ms before the keyboard here) and the slot reads its settled value; lose it and
  // the decision is made against a slot still hundreds of px down the page. That is why this
  // only ever misbehaved on the FIRST focus: the second time the keyboard is already up, there
  // is no animation, and so no race to lose.
  let focusSettling=false, focusSettleTimer=null;
  function scrollToResults(instant){
    const anchor=document.getElementById('scrollAnchor');
    if(!anchor) return;
    // offsetTop on the sticky search bar itself is unreliable once it's "stuck"
    // in some browsers, so target a plain (non-sticky) marker just above it and
    // compute its position fresh each time via getBoundingClientRect + scrollY.
    // The repeat passes exist to beat iOS's own scroll-into-view when the keyboard opens (see

    // away immediately had the 120ms pass haul the page back to the top — measured going to
    // 490 and returning to 230. A wheel, a fresh touch or a key means someone has taken over,
    // and from then on we leave the page alone. iOS's own scroll-into-view raises none of
    // those, so it is still corrected. The listener is registered after the tap that focused
    // the field, so that tap does not count as taking over.
    let takenOver = false;
    const claim = ()=>{ takenOver = true; };
    const opts = {passive:true};
    // Deferred past the current event dispatch: this is now also called from the search
    // field's TOUCHSTART, and inline registration would let that very touch bubble into
    // the fresh claim listener — the scroll instantly cancelling its own correction passes.
    setTimeout(()=>{
      addEventListener('wheel', claim, opts);
      addEventListener('touchstart', claim, opts);
      addEventListener('touchmove', claim, opts);
      addEventListener('keydown', claim, opts);
    }, 0);
    // Land a few px PAST the slot, never exactly on it. Every pin/unpin decision keys on
    // naturalTop(), which is max(0, anchorTop) — clamped below but not above. Arriving from
    // BELOW leaves anchorTop negative, so naturalTop is a hard 0, nowhere near STICK_EPS, and
    // the decision is stable. Arriving from ABOVE lands it around 0-6, straddling STICK_EPS, so
    // the bar flips pinned<->sticky as the scroll settles and each flip toggles a class and the
    // anchor's height — layout churn, felt as the jitter that only ever appeared when focusing
    // from above. Overshooting puts both directions on the clamped side. It is invisible: at or
    // past the slot the bar sits at the top either way.
    const OVERSHOOT = 6;
    // How far off the slot has to be before a CORRECTION pass will move the page. The first
    // pass always runs; the later two exist only to beat iOS's own scroll-into-view, and iOS
    // usually lands somewhere perfectly acceptable a handful of px away. Re-scrolling for that
    // yanks the page back under the user — a visible jump, and an intermittent one, since it
    // depends on whether iOS's scroll landed before or after our pass. It can only happen when
    // there was a real scroll to do, i.e. when focusing from ABOVE the bar; from below the slot
    // is already at the top, the passes are no-ops, and nothing ever jumps. That is exactly the
    // asymmetry reported: intermittent, only from above, never from below.
    const SETTLE_EPS = 8;
    const doScroll=(force)=>{
      if(takenOver) return;
      const delta = anchor.getBoundingClientRect().top + OVERSHOOT;
      if(force!==true && Math.abs(delta) <= SETTLE_EPS) return;   // close enough — leave it alone
      window.scrollTo({top: Math.max(0, window.scrollY + delta), behavior: instant===true ? 'instant' : 'smooth'});
    };

    if(instant===true){
      focusSettling=true;
      // Hard release, so a skipped or throwing pass can never strand the flag. Stranded, the
      // bar would stay unpinned through a keyboard close, which is the mid-screen drop.
      clearTimeout(focusSettleTimer);
      focusSettleTimer=setTimeout(()=>{ focusSettling=false; }, 350);
    }
    // The keyboard-show restore. WebKit saves the scroll position when the tap begins and
    // RESTORES it the moment the keyboard's geometry arrives — measured: scrollY 354 -> 0
    // (the exact pre-tap value) in the same 8ms sample as vv.height shrinking, bar rendered
    // in flow at its old slot for ~one frame, then corrected. That restore undoes any scroll
    // made between tap and keyboard-show, ours included; focus({preventScroll}) does not
    // suppress it (it only skips scroll-into-view). It is also why the flash needs a real
    // scroll to exist: from below the saved position already equals the target, so the
    // restore moves nothing. So: re-assert the target on the very events the restore arrives
    // with (vv resize, and the scroll event it emits) — same turn, before paint reflects it.
    // takenOver still wins: a user swiping away claims the page and the corrector stands down.
    if(instant===true && vv){
      const fix=()=>doScroll();          // deadbanded: no-op unless the slot is really off
      vv.addEventListener('resize', fix);
      addEventListener('scroll', fix, opts);
      setTimeout(()=>{
        vv.removeEventListener('resize', fix);
        removeEventListener('scroll', fix, opts);
      }, 900);
    }
    doScroll(true);                      // the real scroll — always runs
    requestAnimationFrame(()=>doScroll());   // wrapped: rAF passes a timestamp, never `force`
    setTimeout(()=>{
      doScroll();
      removeEventListener('wheel', claim, opts);
      removeEventListener('touchstart', claim, opts);
      removeEventListener('touchmove', claim, opts);
      removeEventListener('keydown', claim, opts);
      // One frame later the instant scroll above has been applied, so the slot now reads its
      // settled value and the decision is safe to make. Runs even if the user took over: then
      // the slot is wherever they put it, which is equally a real value.
      if(instant===true) requestAnimationFrame(()=>{
        focusSettling=false; clearTimeout(focusSettleTimer);
      });
    }, 120);
  }
  // menu chips: toggle this filter (clearing the others), then close the dropdown
  const BOOL_FILTER = new Set(['tentative','flower']);   // toggles, not values

  function linkifyBlurb(text){
    return text.replace(/#([a-z0-9-]+)/gi, (m, id)=>{
      const target = data.find(x=>x.id===id);
      if(!target) return m;

  function renderModal(d){

    sheet.querySelectorAll('[data-genus]').forEach(el=>{ el.onclick=()=>applyFilter('genus', el.dataset.genus); });
    sheet.querySelectorAll('[data-region]').forEach(el=>{ el.onclick=()=>applyFilter('region', el.dataset.region); });
    sheet.querySelectorAll('[data-tentative]').forEach(el=>{ el.onclick=()=>applyFilter('tentative'); });

    {
      const photoEl=sheet.querySelector('.photo'), first=sheet.querySelector('.photo .track img');

    // it. Any page scroll while the bar is pinned or a settle is pending counts as motion.
    window.addEventListener('scroll', ()=>{
      if(pinned || settleTimer || keyboardUp() || Math.round(vv.offsetTop) > 0) onChange();
    }, {passive:true});
  }

  // No JS touches the glass. There was machinery here that swapped the .glass div for a
  // fresh clone to rebuild its backdrop layer; it was making the whole bar blink out. The
  // bar carries no background of its own — it must stay transparent for the blur to sample
  // the page — so the .glass div paints the entire visible bar, and a new backdrop-filter
  // element paints nothing until the compositor builds its layer. Removing the div, even
  // for a frame, therefore removes the bar. The glass is now pure CSS and permanent.

  // Tapping the field scrolls the bar to the top INSTANTLY. A smooth scroll animates, and
  // iOS runs its own scroll-into-view the moment the keyboard shows — mid-animation the
  // input isn't at the top yet, so iOS pans the visual viewport (offsetTop jumps up) to
  // reveal it. That pan is the whole reason the bar must pin to fixed and later hand back
  // to sticky, and that handoff is what flickered. Landing the input at the top in ONE
  // frame, before iOS looks, means it never pans — offsetTop stays ~0, the pin never moves
  // the bar, and the fixed->sticky handoff is a true no-op at the same position.
  // Deliberately no growPadForWorstCase() here. Focus doesn't shrink the grid, so there's
  // nothing to make room for — render() already grew the pad when the filter changed it.
  // Scroll BEFORE focus, not just on it. iOS runs its own scroll-into-view on focus, computed
  // from geometry captured at the tap — when, focusing from above, the field was still its
  // full slot distance down the page. Our focus-time scroll then races that: if iOS captures
  // first, it re-runs its reveal from the stale geometry and drags scrollY back toward the
  // pre-scroll value before returning — seen as the bar dropping to EXACTLY its old slot
  // position and snapping back. (That displacement equaling the scroll distance is what
  // identifies the page scroll, not the bar machinery, as the mover: a sticky bar sits there
  // only when scrollY is back at ~0.) From below the bar is already stuck at the visual top
  // when the tap lands, iOS sees nothing to reveal and stands down — one scroller, never a
  // fight, which is why that direction never jittered.
  // NOT via a scroll in mousedown: the synthesized click is re-hit-tested at dispatch, so the
  // card that slides under the tap point receives it — measured on video actually opening that
  // plant's modal. Instead take over the whole tap at touchend: preventDefault cancels the
  // click synthesis outright (nothing left to re-target), then scroll, then focus with the
  // browser's own scroll-into-view suppressed — no second scroller even exists. Only for a
  // stationary tap on the unfocused field: a scroll gesture ending on the field keeps its
  // default (it produces no click anyway), and a caret tap on the focused field keeps iOS's
  // native caret handling.
  let tapX=0, tapY=0, tapMoved=false;
  // The from-below porting trick. Focusing from BELOW never glitches because there the
  // field is already at the visual top when the finger lands — iOS makes its keyboard
  // reveal/save decision from TAP-TIME geometry, finds nothing to do, and the whole
  // restore/reveal/pan dance never gets scheduled. Scrolling at touchEND was too late:
  // the tap had already been measured against the old layout. So scroll at finger-DOWN,
  // before the tap commits — by the time iOS captures anything, the field has been at the
  // top for the whole tap, from above exactly as from below. (Also simply faster.)
  // No pre-scroll during the touch at all: any early scroll makes a drag that merely
  // begins on the field jump the page, and no time-based fuse can tell a resting tap from
  // a slow-starting drag (and a snap-back mid-gesture is refused - iOS owns the scroller
  // during a native pan, so a wrong guess sticks). The takeover below scrolls at touchend,
  // synchronously BEFORE calling focus(): the keyboard's geometry decisions happen inside
  // the focus it triggers, so the field is at the top by the time they are made.
  searchInput.addEventListener('touchstart', e=>{
    const t=e.touches[0]; tapX=t.clientX; tapY=t.clientY; tapMoved=false;
  }, {passive:true});
  searchInput.addEventListener('touchmove', e=>{
    const t=e.touches[0];
    if(Math.abs(t.clientX-tapX)>8 || Math.abs(t.clientY-tapY)>8) tapMoved=true;
  }, {passive:true});
  searchInput.addEventListener('touchend', e=>{
    if(document.activeElement===searchInput) return;   // caret taps keep native handling
    // preventDefault for EVERY touch ending on the unfocused field, moved or not. Our drag
    // threshold (8px) is tighter than iOS's native tap slop, so a short swipe in the gap
    // read as a drag to us but as a TAP to iOS - its synthesized click focused the field
    // through the native, un-taken-over path, and swiping across the bar opened search.
    // Cancelling click synthesis here closes that path; the scroll the swipe performed is
    // already done natively and is unaffected.
    e.preventDefault();
    if(tapMoved) return;                               // a drag: no focus, and now no native one either
    // The scroll is an instant cut, by choice — a FLIP glide was tried and the user
    // preferred the immediacy. It must complete before focus() anyway: iOS reads the
    // field's position from settled layout (the flash fix), and focus() must stay
    // synchronous in this handler or iOS shows no keyboard.
    scrollToResults(true);
    searchInput.focus({preventScroll:true});
    // The keyboard-show restore, outraced. The save happens at gesture-begin (before this
    // handler's scroll), so at keyboard-show iOS restores the PRE-scroll position for one
    // frame; the event-driven corrector puts it back a frame later — a small down-and-up
    // bump, and the caret gets drawn against the bumped geometry (spawning visibly low).
    // This guard is proactive instead: rAF runs BEFORE paint, so re-asserting the target
    // each frame for the keyboard's opening window means the restored frame is corrected
    // before it can render. On quiet frames it is a no-op compare. Any real user input
    // stands it down immediately.
    const target = window.scrollY;
    let holdT0 = performance.now(), holding = true;
    const stopHold = ()=>{ holding = false; };
    addEventListener('touchstart', stopHold, {passive:true, once:true});
    addEventListener('wheel', stopHold, {passive:true, once:true});
    const guard = ()=>{
      if(!holding || performance.now() - holdT0 > 450){
        removeEventListener('touchstart', stopHold);
        removeEventListener('wheel', stopHold);
        return;
      }
      if(Math.abs(window.scrollY - target) > 2) window.scrollTo({top: target, behavior: 'instant'});
      requestAnimationFrame(guard);
    };
    requestAnimationFrame(guard);
  }, {passive:false});
  // Kept for focus arriving any other way (desktop click, tab key, assistive tech) — after
  // the touchend path this is a no-op: the forced pass re-scrolls to where the page already
  // is, and the correction passes stand down inside their deadband.
  searchInput.addEventListener('focus', ()=>scrollToResults(true));
  // let the keyboard's Search key dismiss itself
  searchInput.addEventListener('keydown', e=>{ if(e.key==='Enter') searchInput.blur(); });
  // field × just clears the search text and scrolls back to the top, like unselecting a filter
  document.getElementById('searchClose').addEventListener('click', ()=>{
    searchInput.value=''; state.q=''; searchBox.classList.remove('hastext');
    render(); searchInput.blur();
    // If the keyboard is up (pinned OR mid-transition sticky — e.g. X right after a
    // down-and-up scroll, before the settle re-pinned), the blur is about to close it:
    // viewport height, spacer and bar position all about to change. A scroll computed NOW
    // targets a layout that's about to shift and lands offset (bar mid-screen / lines
    // above). Defer it to onSettled so it runs against the final layout instead.
    if(pinned || keyboardUp()) scrollAfterSettle=true;
    else scrollToResults();
  });

  // loading="lazy" keeps the first paint cheap, but it also means a card sitting far
  // down the page still has no image when a filter pulls it up into view — it renders
  // blank for a beat, then pops in. That's the intermittent flash, and why it only hits
  // photos you haven't scrolled past yet. Once the page itself has loaded, quietly warm
  // the rest (flipping lazy->eager resumes the deferred fetch) so filtering never lands
  // on an unloaded image. The whole set is ~16 MB, and it's the same bytes you'd pull by
  // scrolling to the bottom anyway — just fetched before they're needed instead of during.
  window.addEventListener('load', ()=>{
    setTimeout(()=>{
      for(const img of grid.querySelectorAll('img[loading="lazy"]')) img.loading='eager';
    }, 300);
  });

  // Only re-trim on a REAL resize (orientation change, desktop window drag), detected by a
  // width change. On iOS, resize also fires every time Safari's toolbar collapses/expands —
  // which happens as a scroll decelerates — and trimming there changes the document height
  // mid-scroll, relaying out the page while it moves. Height-only resizes (toolbar, and the
  // keyboard) are exactly the ones we must ignore; the pad is height-only anyway, so a
  // width change is the only thing that can alter what "minimal" means.
  let lastWidth = window.innerWidth;
  window.addEventListener('resize', ()=>{
    if(window.innerWidth === lastWidth) return;
    lastWidth = window.innerWidth;
    trimPadToMinimal();
  });
  // ---- language switching
  // Cards are NOT rebuilt: their images would be destroyed and re-decoded, which is the flash
  // the build-once comment above warns about. Only the text that actually differs is rewritten.
  function applyLang(){
    const L = I18N[lang];
    document.documentElement.lang = L.htmlLang;
    document.title = L.title;
    document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = L[el.dataset.i18n]; });
    const q = document.getElementById('q');
    q.placeholder = L.searchPlaceholder;
    q.setAttribute('aria-label', L.searchAria);
    document.getElementById('searchClose').setAttribute('aria-label', L.clearSearch);
    document.querySelector('#filterToggle .flabel').textContent = L.filter;
    document.getElementById('langSwitch').textContent = L.other;
    // facet chips keep their canonical dataset.val; only the visible label changes
    document.querySelectorAll('#regionFacet .chip').forEach(c=>{ c.textContent = regionLabel(c.dataset.val); });
    document.querySelectorAll('#genusFacet .chip').forEach(c=>{ c.textContent = genusLabel(c.dataset.val); });
    const mix=document.querySelector('#otherFacet .chip[data-other="mixed"]'); if(mix) mix.textContent = '🔀 '+genusLabel(SPECIAL);
    const ten=document.querySelector('#otherFacet .chip[data-other="tentative"]'); if(ten) ten.textContent = '? '+L.tentative;
    const flw=document.querySelector('#otherFacet .chip[data-other="flower"]');
    if(flw) flw.textContent = '🌸 '+L.inFlower;
    emptyMsgEl.textContent = L.noMatch;
    for(const d of sortedAll){
      const el = cardEls.get(d.id); if(!el) continue;
      const meta = el.querySelector('.meta span'); if(meta) meta.textContent = originLabel(d.origin);
      if(d.name_sk){                                  // the two mixed bowls have a translated name
        const sci = el.querySelector('.sci');
        if(sci && sci.firstChild) sci.firstChild.textContent = nameOf(d) + ' ';
      }
      el.querySelectorAll('.mark').forEach(m=>{
        const txt = m.dataset.mark==='mixed' ? L.mixedCard : L.inFlowerCard;
        m.title = txt; m.setAttribute('aria-label', txt);
      });
    }
    render();
    if(openId){ const d=data.find(x=>x.id===openId); if(d) renderModal(d); }
  }
  document.getElementById('langSwitch').addEventListener('click', ()=>{
    lang = lang==='en' ? 'sk' : 'en';
    localStorage.setItem('lang', lang);
    applyLang();
  });
  applyLang();

  // deep-link support. The older "#id" form is still accepted so that any link shared before
  // the switch to ?p= still resolves; it costs one line and upgrades itself once open.
  {
    const id = new URLSearchParams(location.search).get('p') || decodeURIComponent(location.hash.slice(1));
    if(id && data.some(d=>d.id===id)) openModal(id);
  }
</script>
</body>
</html>
